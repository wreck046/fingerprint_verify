<h2>Users</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>NIK</th>
  </tr>

  {% for user in users %}
  <tr>
    <td>{{user[0]}}</td>
    <td>{{user[1]}}</td>
    <td>{{user[2]}}</td>
  </tr>
  {% endfor %}
</table>

<h2>Verification Logs</h2>

<table border="1">
  <tr>
    <th>Name</th>
    <th>Time</th>
    <th>Result</th>
  </tr>

  {% for log in logs %}
  <tr>
    <td>{{log[0]}}</td>
    <td>{{log[1]}}</td>
    <td>{{log[2]}}</td>
  </tr>
  {% endfor %}
</table>
